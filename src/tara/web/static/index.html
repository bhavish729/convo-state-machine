<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tara - Collections Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Shared Form Elements ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555;
        }
        .form-input, .form-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #222;
            background: #111;
            color: #ccc;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            width: 100%;
        }
        .form-input:focus, .form-select:focus { border-color: #444; }
        .form-input:disabled, .form-select:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-select { appearance: none; cursor: pointer; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* ── Start Screen ── */
        #start-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        .logo { text-align: center; }
        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
        }
        .logo p {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Setup card */
        .setup-card {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .setup-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #555;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1a1a1a;
        }
        .setup-divider {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin: 4px 0;
        }

        /* Agent badge (large, start screen) */
        .agent-badge-lg {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .agent-badge-lg .agent-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .agent-badge-lg.pre_due { background: #1a2a1a; color: #6bc56b; }
        .agent-badge-lg.pre_due .agent-dot { background: #6bc56b; }
        .agent-badge-lg.bucket_x { background: #2a2a1a; color: #f5a623; }
        .agent-badge-lg.bucket_x .agent-dot { background: #f5a623; }
        .agent-badge-lg.npa { background: #2e1a1a; color: #e74c3c; }
        .agent-badge-lg.npa .agent-dot { background: #e74c3c; }

        /* Agent summary grid */
        .agent-summary {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2px 12px;
            font-size: 12px;
            margin-top: 8px;
        }
        .agent-summary .ak {
            color: #555;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
        }
        .agent-summary .av {
            color: #999;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
        }

        .start-btn {
            padding: 14px 48px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #7c8cf5, #6366f1);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            width: 100%;
        }
        .start-btn:hover { transform: scale(1.02); box-shadow: 0 4px 24px rgba(99, 102, 241, 0.3); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Call Screen ── */
        #call-screen {
            height: 100vh;
            display: none;
            flex-direction: column;
        }
        .call-header {
            padding: 14px 24px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0d0d0d;
        }
        .call-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .call-header h2 { font-size: 16px; font-weight: 600; }
        .phase-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            background: #1a1a2e;
            color: #7c8cf5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .call-counter {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 10px;
            background: #1a1a1a;
            color: #888;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .call-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .call-timer {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            min-width: 52px;
            text-align: center;
        }
        .end-call-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid #3a2020;
            background: #1a1010;
            color: #e74c3c;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .end-call-btn:hover { background: #2a1515; }

        /* ── Error Toast ── */
        .error-container {
            position: fixed;
            top: 60px;
            right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }
        .error-toast {
            background: #1a1010;
            border: 1px solid #3a2020;
            border-left: 3px solid #e74c3c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #e74c3c;
            font-family: 'SF Mono', 'Menlo', monospace;
            line-height: 1.4;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 8s forwards;
            word-break: break-word;
        }
        .error-toast .error-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #e74c3c;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .error-toast .error-msg { color: #cc8888; }
        .info-toast {
            background: #101a1a;
            border: 1px solid #203a3a;
            border-left: 3px solid #f39c12;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #f39c12;
            font-family: 'SF Mono', 'Menlo', monospace;
            line-height: 1.4;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 5s forwards;
            word-break: break-word;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ── Three Column Layout ── */
        .call-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── State Panel (Left) ── */
        .state-panel {
            width: 320px;
            min-width: 320px;
            border-right: 1px solid #1a1a1a;
            background: #0d0d0d;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
            position: sticky;
            top: 0;
            background: #0d0d0d;
            z-index: 1;
        }
        .panel-header .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }
        .panel-header .dot.live { background: #6bc56b; }

        .state-section {
            padding: 10px 16px;
            border-bottom: 1px solid #111;
        }
        .state-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #555;
            margin-bottom: 8px;
        }
        .state-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 3px 0;
            font-size: 12px;
            line-height: 1.4;
        }
        .state-key {
            color: #666;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .state-val {
            color: #bbb;
            text-align: right;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
            word-break: break-word;
            max-width: 180px;
        }
        .state-val.highlight { color: #7c8cf5; font-weight: 600; }
        .state-val.success { color: #6bc56b; }
        .state-val.warning { color: #f5a623; }
        .state-val.danger { color: #e74c3c; }
        .state-val.muted { color: #444; }

        .state-reasoning {
            font-size: 11px;
            color: #555;
            font-style: italic;
            padding: 4px 0;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Node badge in state panel */
        .node-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            font-family: 'SF Mono', 'Menlo', monospace;
            letter-spacing: 0.3px;
        }
        .node-badge.identify_borrower { background: #1a2a1a; color: #6bc56b; }
        .node-badge.state_purpose     { background: #1a1a2e; color: #7c8cf5; }
        .node-badge.handle_objection  { background: #2e1a1a; color: #e74c3c; }
        .node-badge.present_options   { background: #2a2a1a; color: #f5a623; }
        .node-badge.validate_commitment { background: #1a2a2a; color: #56c5b5; }
        .node-badge.confirm_payment_date { background: #1a2e1a; color: #6bc56b; }
        .node-badge.confirm_full_payment { background: #2a2a1a; color: #f5a623; }
        .node-badge.escalate          { background: #2e1a2a; color: #c56bc5; }
        .node-badge.end_agreement     { background: #1a2e1a; color: #6bc56b; }
        .node-badge.end_refusal       { background: #2e1a1a; color: #e74c3c; }
        .node-badge.end_callback      { background: #2a2a1a; color: #f5a623; }

        /* ── Config Panel (Right) ── */
        .config-panel {
            width: 340px;
            min-width: 340px;
            border-left: 1px solid #1a1a1a;
            background: #0d0d0d;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .config-panel .state-section:last-child { border-bottom: none; }

        /* Agent badge in right panel (smaller) */
        .agent-badge-sm {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .agent-badge-sm .agent-dot { width: 6px; height: 6px; border-radius: 50%; }
        .agent-badge-sm.pre_due { background: #1a2a1a; color: #6bc56b; }
        .agent-badge-sm.pre_due .agent-dot { background: #6bc56b; }
        .agent-badge-sm.bucket_x { background: #2a2a1a; color: #f5a623; }
        .agent-badge-sm.bucket_x .agent-dot { background: #f5a623; }
        .agent-badge-sm.npa { background: #2e1a1a; color: #e74c3c; }
        .agent-badge-sm.npa .agent-dot { background: #e74c3c; }

        /* Call history entries */
        .call-history-entry {
            padding: 6px 0;
            border-bottom: 1px solid #111;
            font-size: 11px;
        }
        .call-history-entry:last-child { border-bottom: none; }
        .call-history-entry .che-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }
        .call-history-entry .che-label {
            font-weight: 600;
            color: #888;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .call-history-entry .che-duration {
            color: #555;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .call-history-entry .che-outcome {
            color: #999;
            font-size: 11px;
        }

        /* Config panel action buttons */
        .config-actions {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #1a1a1a;
        }
        .next-call-btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #7c8cf5, #6366f1);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        .next-call-btn:hover { transform: scale(1.02); box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3); }
        .reset-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #222;
            background: transparent;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover { border-color: #444; color: #999; }

        /* Between-calls override select */
        .override-select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #151515;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            appearance: none;
            width: 100%;
            margin-top: 6px;
        }

        /* ── Transcript Column (Center) ── */
        .call-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .transcript {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .msg {
            width: 100%;
            max-width: 600px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.tara {
            background: #141428;
            border-left: 3px solid #7c8cf5;
        }
        .msg.user {
            background: #142814;
            border-left: 3px solid #6bc56b;
        }
        .msg .label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .msg.tara .label { color: #7c8cf5; }
        .msg.user .label { color: #6bc56b; }
        .partial {
            width: 100%;
            max-width: 600px;
            padding: 6px 16px;
            font-size: 13px;
            color: #666;
            font-style: italic;
            border-left: 3px solid #333;
        }

        /* ── Bottom Bar ── */
        .bottom-bar {
            padding: 16px 24px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: #0d0d0d;
        }
        .call-status {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 24px;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }
        .status-dot.listening {
            background: #e74c3c;
            animation: pulse-dot 1.2s infinite;
        }
        .status-dot.speaking {
            background: #7c8cf5;
            animation: pulse-dot 1s infinite;
        }
        .status-dot.thinking {
            background: #f5a623;
            animation: spin 1s linear infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
            50% { box-shadow: 0 0 0 6px transparent; opacity: 0.7; }
        }
        @keyframes spin {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .status-text { font-size: 13px; color: #666; }

        /* Audio level visualizer */
        .audio-level {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 20px;
        }
        .audio-bar {
            width: 3px;
            background: #e74c3c;
            border-radius: 2px;
            transition: height 0.05s;
            height: 4px;
        }

        /* Text fallback */
        .text-fallback {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 480px;
        }
        .text-fallback input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #222;
            background: #111;
            color: #ccc;
            font-size: 13px;
            outline: none;
        }
        .text-fallback input:focus { border-color: #444; }
        .text-fallback button {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: #222;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
        }
        .text-fallback button:hover { background: #333; }

        /* Latency display */
        .latency-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 18px;
        }
        .latency-item {
            font-size: 11px;
            font-family: 'SF Mono', 'Menlo', monospace;
            color: #555;
        }
        .latency-item span { color: #888; font-weight: 600; }
        .latency-item.slow span { color: #e74c3c; }
        .latency-item.medium span { color: #f5a623; }
        .latency-item.fast span { color: #6bc56b; }

        /* ── State update flash animation ── */
        @keyframes state-flash {
            0% { background-color: rgba(124, 140, 245, 0.15); }
            100% { background-color: transparent; }
        }
        .state-row.updated {
            animation: state-flash 0.8s ease-out;
        }
    </style>
</head>
<body>

    <!-- ══ START SCREEN ══ -->
    <div id="start-screen">
        <div class="logo">
            <h1>TARA</h1>
            <p>AI Collections Agent</p>
        </div>
        <div class="setup-card">
            <!-- Borrower Preset -->
            <div>
                <div class="setup-section-title">Borrower</div>
                <div class="form-group">
                    <label class="form-label">Preset</label>
                    <select id="borrower-select" class="form-select" onchange="fillFromPreset()">
                        <option value="BRW-001">Rajesh Kumar &mdash; &#8377;85,000 (120 DPD)</option>
                        <option value="BRW-002">Priya Sharma &mdash; &#8377;2,45,000 (210 DPD)</option>
                        <option value="BRW-003">Amit Patel &mdash; &#8377;42,000 (45 DPD)</option>
                    </select>
                </div>
                <div class="form-row" style="margin-top:10px;">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" id="inp-name" class="form-input" value="Rajesh Kumar" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Amount (&#8377;)</label>
                        <input type="number" id="inp-amount" class="form-input" value="85000" readonly>
                    </div>
                </div>
                <div class="form-row" style="margin-top:10px;">
                    <div class="form-group">
                        <label class="form-label">Days Past Due</label>
                        <input type="number" id="inp-dpd" class="form-input" value="120" oninput="detectAgentType()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Risk Tier</label>
                        <select id="inp-risk" class="form-select" disabled>
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" style="margin-top:10px;">
                    <div class="form-group">
                        <label class="form-label">Debt Type</label>
                        <select id="inp-type" class="form-select" disabled>
                            <option value="personal_loan">Personal Loan</option>
                            <option value="credit_card">Credit Card</option>
                            <option value="home_loan">Home Loan</option>
                            <option value="auto_loan">Auto Loan</option>
                            <option value="business_loan">Business Loan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Creditor</label>
                        <input type="text" id="inp-creditor" class="form-input" value="National Finance Corp" readonly>
                    </div>
                </div>
            </div>

            <hr class="setup-divider">

            <!-- Agent Profile -->
            <div>
                <div class="setup-section-title">Agent Profile</div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="agent-badge-start" class="agent-badge-lg npa">
                        <span class="agent-dot"></span>
                        <span id="agent-badge-label">NPA</span>
                    </div>
                    <span id="agent-auto-hint" style="font-size:11px;color:#555;font-style:italic;">auto: 120 DPD &rarr; NPA</span>
                </div>
                <div id="agent-summary-start" class="agent-summary"></div>
                <div class="form-group" style="margin-top:10px;">
                    <label class="form-label">Override</label>
                    <select id="agent-override" class="form-select" onchange="updateAgentProfile()">

<script>
// ═══════════════════════════════════════════════════
//  Constants: Agent Profiles & Borrower Presets
// ═══════════════════════════════════════════════════
const AGENT_PROFILES = {
    pre_due: {
        label: 'PRE-DUE',

        cssClass: 'npa',
        goal: 'Max settlement %',

        settlement: '20-50% floor',
        installments: '6/12/18 mo',

        consequences: 'Full arsenal',

};

const BORROWER_PRESETS = {
    'BRW-001': { name: 'Rajesh Kumar', amount: 85000, dpd: 120, risk: 'medium', type: 'personal_loan', creditor: 'National Finance Corp' },
    'BRW-002': { name: 'Priya Sharma', amount: 245000, dpd: 210, risk: 'high', type: 'credit_card', creditor: 'Metro Bank Ltd' },
    'BRW-003': { name: 'Amit Patel', amount: 42000, dpd: 45, risk: 'low', type: 'personal_loan', creditor: 'City Credit Union' },
};

// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
let ws = null;
let isRecording = false;
let micAvailable = false;
let isTerminal = false;
let isTaraSpeaking = false;

// Call timer
let callStartTime = 0;
let callTimerInterval = null;

// Audio capture
let audioContext = null;
let audioStream = null;
let audioWorkletNode = null;
let audioSource = null;
let analyserNode = null;
let sampleRate = 16000;

// Audio playback
let incomingAudioChunks = [];
let currentAudio = null;

// Streaming audio playback (MediaSource API)
let mediaSource = null;
let sourceBuffer = null;
let audioQueue = [];       // chunks waiting to be appended to SourceBuffer
let streamingAudio = null;
let isStreamingPlayback = false;
// MediaSource streaming disabled — causes race conditions where endOfStream
// fires before audio data arrives. Blob playback is stable and the other
// optimizations (eager STT, LLM cache, VAD tuning, TTS pre-warm) cut ~3s.
const USE_STREAMING = false;

// VAD (Voice Activity Detection)
let vadState = 'IDLE'; // IDLE | WAITING | SPEAKING | TRAILING
let speechStartTime = 0;
let silenceStartTime = 0;
let vadInterval = null;
const VAD_THRESHOLD = 0.012;
const SILENCE_TIMEOUT = 800;    // Reduced from 1200ms — Hindi speech pauses < 800ms
const SPEECH_MIN_DURATION = 200; // Reduced from 300ms — faster detection of real speech

// Latency tracking
let turnStartTime = 0;
let latencyData = {};

// Partial transcript
let partialEl = null;

// Audio level bars
const NUM_BARS = 12;

// Previous state for diff highlighting
let prevState = null;

// Barge-in (speech overlap detection)
let bargeInInterval = null;
let bargeInSource = null;
const BARGE_IN_THRESHOLD = 0.025;

// ── Multi-call state ──
let callNumber = 0;
let callHistory = [];
let currentBorrowerId = '';
let currentAgentType = '';
let lastState = null;          // Latest state from state_update
let isBetweenCalls = false;
let nextCallAgentType = '';    // Override for next call

// ═══════════════════════════════════════════════════
//  AudioWorklet processor (inlined via Blob URL)
// ═══════════════════════════════════════════════════
const PROCESSOR_CODE = `
class PCMProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.buffer = new Float32Array(1600);
        this.writeIndex = 0;
    }
    process(inputs) {
        const input = inputs[0];
        if (!input || !input[0]) return true;
        const data = input[0];
        for (let i = 0; i < data.length; i++) {
            this.buffer[this.writeIndex++] = data[i];
            if (this.writeIndex >= this.buffer.length) {
                const int16 = new Int16Array(this.buffer.length);
                for (let j = 0; j < this.buffer.length; j++) {
                    const s = Math.max(-1, Math.min(1, this.buffer[j]));
                    int16[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage(int16.buffer, [int16.buffer]);
                this.writeIndex = 0;
            }
        }
        return true;
    }
}
registerProcessor('pcm-processor', PCMProcessor);
`;

// ═══════════════════════════════════════════════════
//  Start Screen Logic
// ═══════════════════════════════════════════════════
function fillFromPreset() {
    const id = document.getElementById('borrower-select').value;

}

function detectAgentType() {
    const dpd = parseInt(document.getElementById('inp-dpd').value) || 0;

    if (override !== 'auto') {
        agent = override;
    } else {
        if (dpd <= 30) agent = 'pre_due';
        else if (dpd <= 90) agent = 'bucket_x';
        else agent = 'npa';
    }
    renderAgentBadgeStart(agent, dpd);
}

function updateAgentProfile() {
    detectAgentType();
}

}

// Initialize start screen on load
document.addEventListener('DOMContentLoaded', () => {

});

// ═══════════════════════════════════════════════════
//  Mic Setup
// ═══════════════════════════════════════════════════
async function setupMic() {
    try {
        // getUserMedia requires a secure context (HTTPS or localhost/127.0.0.1)
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            if (!isLocalhost) {
                showError('Mic requires secure context. Open http://localhost:' + location.port + ' instead of ' + location.hostname);
                console.error('[MIC] navigator.mediaDevices unavailable — not a secure context. Use http://localhost:' + location.port);
            } else {
                showError('Browser does not support getUserMedia');
                console.error('[MIC] navigator.mediaDevices.getUserMedia not supported');
            }
            return false;
        }
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        try {
            audioContext = new AudioContext({ sampleRate: 16000 });
        } catch (e) {
            audioContext = new AudioContext();
        }
        sampleRate = audioContext.sampleRate;

        const blob = new Blob([PROCESSOR_CODE], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        await audioContext.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 2048;

        micAvailable = true;
        return true;
    } catch (e) {
        console.warn('Mic not available:', e.message);
        return false;
    }
}

// ═══════════════════════════════════════════════════
//  Start Call
// ═══════════════════════════════════════════════════
async function startCall() {
    const borrowerId = document.getElementById('borrower-select').value;
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = 'Connecting...';

    // Determine agent type
    const override = document.getElementById('agent-override').value;
    let agentType;
    if (override !== 'auto') {
        agentType = override;
    } else {
        const dpd = parseInt(document.getElementById('inp-dpd').value) || 0;
        if (dpd <= 30) agentType = 'pre_due';
        else if (dpd <= 90) agentType = 'bucket_x';
        else agentType = 'npa';
    }

    currentBorrowerId = borrowerId;
    currentAgentType = agentType;
    callNumber = 1;
    callHistory = [];
    isBetweenCalls = false;
    lastState = null;
    prevState = null;

    try {
        const hasMic = await setupMic();
        if (!hasMic) setStatus('listening', 'Mic unavailable \u2014 use text input');

        const res = await fetch(`/api/session?borrower_id=${borrowerId}&agent_type=${agentType}`, { method: 'POST' });
        const data = await res.json();

        if (data.error) {
            alert('Error: ' + data.error);
            btn.disabled = false;
            btn.textContent = 'Start Conversation';
            return;
        }

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('call-screen').style.display = 'flex';

        // Update header
        document.getElementById('call-counter').textContent = 'Call ' + callNumber;

        // Start call timer
        callStartTime = Date.now();
        callTimerInterval = setInterval(updateCallTimer, 1000);
        updateCallTimer();

        addMessage('tara', data.opening_message);
        updatePhase(data.phase);

        // Render initial state + config panel
        if (data.state) {
            renderState(data.state);
            lastState = data.state;
        }
        renderConfigPanel(agentType);

        // Hide between-call UI
        document.getElementById('config-actions').style.display = 'none';
        document.getElementById('config-override-section').style.display = 'none';

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws/${data.session_id}`);
        ws.binaryType = 'arraybuffer';
        ws.onmessage = handleWsMessage;
        ws.onclose = () => { setStatus('', 'Call ended'); isTerminal = true; };
        ws.onerror = (e) => { console.error('WS error:', e); setStatus('', 'Connection error'); };

        setStatus('speaking', 'Tara is speaking...');
    } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Start Conversation';
        alert('Failed to start: ' + err.message);
    }
}

// ═══════════════════════════════════════════════════
//  End Call + Multi-Call
// ═══════════════════════════════════════════════════
function endCall() {
    isTerminal = true;
    isBetweenCalls = true;
    stopListening();
    stopBargeInMonitor();
    if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (ws) { ws.close(); ws = null; }
    setStatus('', 'Call ended');

    // Record call outcome
    const outcome = lastState?.call_progress?.call_outcome || 'ended';
    const phase = lastState?.conversation_phase || 'unknown';
    const duration = document.getElementById('call-timer').textContent;
    callHistory.push({
        call_number: callNumber,
        agent_type: currentAgentType,
        outcome: outcome,
        phase: String(phase).replace('ConversationPhase.', ''),
        duration: duration,
    });

    // Show between-calls UI
    document.getElementById('config-actions').style.display = 'flex';
    document.getElementById('config-override-section').style.display = '';
    document.getElementById('agent-override-call').value = currentAgentType;
    nextCallAgentType = currentAgentType;

    // Update call history in config panel
    renderCallHistory();
}

async function nextCall() {
    // Determine agent type for next call
    const agentType = nextCallAgentType || currentAgentType;

    callNumber++;
    isBetweenCalls = false;

function resetAll() {
    // Stop everything
    isTerminal = true;
    stopListening();

    callNumber = 0;
    callHistory = [];
    currentBorrowerId = '';
    currentAgentType = '';
    lastState = null;
    prevState = null;
    isBetweenCalls = false;
    isTerminal = false;
    isTaraSpeaking = false;

    document.getElementById('transcript').innerHTML = '';
    document.getElementById('latency-bar').innerHTML = '';

        <div class="state-section">

                <span class="state-key">waiting</span>

function onCallAgentOverride() {

}

// ═══════════════════════════════════════════════════
//  Recording + VAD
// ═══════════════════════════════════════════════════
function startListening() {
    if (!micAvailable || !ws || ws.readyState !== WebSocket.OPEN || isTerminal) return;
    if (isRecording) return;
    isRecording = true;

    if (audioContext.state === 'suspended') audioContext.resume();
    ws.send(JSON.stringify({ type: 'start_recording', sample_rate: sampleRate }));

    audioSource = audioContext.createMediaStreamSource(audioStream);
    audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
    audioWorkletNode.port.onmessage = (e) => {
        if (ws && ws.readyState === WebSocket.OPEN && isRecording) ws.send(e.data);
    };
    audioSource.connect(audioWorkletNode);
    audioSource.connect(analyserNode);

    const silentGain = audioContext.createGain();
    silentGain.gain.value = 0;
    audioWorkletNode.connect(silentGain);
    silentGain.connect(audioContext.destination);

    vadState = 'WAITING';
    vadInterval = setInterval(runVAD, 60);
    setStatus('listening', 'Listening...');
    setupAudioBars();
}

function stopListening() {
    if (!isRecording) return;
    isRecording = false;
    turnStartTime = performance.now();
    latencyData = {};

    vadState = 'IDLE';
    if (vadInterval) { clearInterval(vadInterval); vadInterval = null; }
    if (audioWorkletNode) { audioWorkletNode.disconnect(); audioWorkletNode = null; }
    if (audioSource) { audioSource.disconnect(); audioSource = null; }

    removePartial();
    hideAudioBars();

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop_recording' }));
    }
    setStatus('thinking', 'Processing...');
}

// ═══════════════════════════════════════════════════
//  VAD
// ═══════════════════════════════════════════════════
function runVAD() {
    if (!analyserNode || !isRecording) return;
    const data = new Float32Array(analyserNode.fftSize);
    analyserNode.getFloatTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
    const rms = Math.sqrt(sum / data.length);
    updateAudioBars(rms);

    switch (vadState) {
        case 'WAITING':
            if (rms > VAD_THRESHOLD) { vadState = 'SPEAKING'; speechStartTime = Date.now(); }
            break;
        case 'SPEAKING':
            if (rms < VAD_THRESHOLD && Date.now() - speechStartTime > SPEECH_MIN_DURATION) {
                vadState = 'TRAILING'; silenceStartTime = Date.now();
            }
            break;
        case 'TRAILING':
            if (rms > VAD_THRESHOLD) vadState = 'SPEAKING';
            else if (Date.now() - silenceStartTime > SILENCE_TIMEOUT) stopListening();
            break;
    }
}

// ═══════════════════════════════════════════════════
//  WebSocket Message Handler
// ═══════════════════════════════════════════════════
function handleWsMessage(event) {
    if (event.data instanceof ArrayBuffer) {
        if (USE_STREAMING && isStreamingPlayback) {
            // Streaming: queue chunk for immediate playback via MediaSource
            audioQueue.push(new Uint8Array(event.data));
            processAudioQueue();
        } else {
            // Fallback: accumulate for blob playback
            incomingAudioChunks.push(event.data);
        }
        return;
    }

    const data = JSON.parse(event.data);
    console.log('[WS] Received:', data.type, data.status || '');

    switch (data.type) {
        case 'transcript':
            removePartial();
            addMessage(data.speaker, data.text);
            if (data.phase) updatePhase(data.phase);
            if (data.is_terminal) { isTerminal = true; setStatus('', 'Call completed'); }
            if (data.latency) {
                Object.assign(latencyData, data.latency);
                if (data.speaker === 'user' && turnStartTime) {
                    latencyData.stt_client_ms = Math.round(performance.now() - turnStartTime);
                }
            }
            break;

        case 'partial_transcript':
            showPartial(data.text);
            break;

        case 'status':
            if (data.status === 'speaking') {
                isTaraSpeaking = true;
                setStatus('speaking', 'Tara is speaking...');
                // Init streaming playback when TTS is about to start
                if (USE_STREAMING) {
                    console.log('[WS] Speaking status → init streaming playback');
                    initStreamingPlayback();
                }
            }
            else if (data.status === 'thinking') setStatus('thinking', 'Processing...');
            else if (data.status === 'listening') setStatus('listening', 'Listening...');
            else if (data.status === 'no_speech') {
                setStatus('idle', 'Ready');
                showToast(data.message || 'Kuch sunai nahi diya, please phir se boliye');
            }
            break;

        case 'audio_end':
            console.log('[WS] audio_end → isStreamingPlayback=', isStreamingPlayback,
                'audioQueue=', audioQueue.length, 'blobChunks=', incomingAudioChunks.length);
            if (data.latency) Object.assign(latencyData, data.latency);
            if (turnStartTime) latencyData.total_ms = Math.round(performance.now() - turnStartTime);
            showLatency(latencyData);
            if (isStreamingPlayback) {
                finalizeStreamingPlayback();
            } else {
                playAudioChunks();
            }
            break;

        case 'state_update':
            if (data.state) {
                renderState(data.state);
                lastState = data.state;
            }
            break;

        case 'terminal':
            isTerminal = true;
            if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
            // Record outcome from latest state
            if (lastState) {
                const outcome = lastState.call_progress?.call_outcome || 'completed';
                const phase = String(lastState.conversation_phase || 'unknown').replace('ConversationPhase.', '');
                const duration = document.getElementById('call-timer').textContent;
                // Only add if not already recorded by endCall
                if (!callHistory.find(h => h.call_number === callNumber)) {
                    callHistory.push({
                        call_number: callNumber,
                        agent_type: currentAgentType,
                        outcome: outcome,
                        phase: phase,
                        duration: duration,
                    });
                }
            }
            isBetweenCalls = true;
            // Show between-calls UI
            document.getElementById('config-actions').style.display = 'flex';
            document.getElementById('config-override-section').style.display = '';
            document.getElementById('agent-override-call').value = currentAgentType;
            nextCallAgentType = currentAgentType;
            renderCallHistory();

            setTimeout(() => {
                setStatus('', 'Call completed');
                if (ws) { ws.close(); ws = null; }
            }, 5000);
            break;

        case 'error':
            console.error('Server error:', data.error);
            showError(data.error);
            break;
    }
}

// ═══════════════════════════════════════════════════
//  Audio Playback — Streaming (MediaSource) + Fallback (Blob)
// ═══════════════════════════════════════════════════

// ── Streaming playback via MediaSource API ──
// Plays audio chunks as they arrive, eliminating the wait for all chunks.
// Supported: Chrome, Safari. Falls back to blob on Firefox.

let streamingFinalized = false;  // true after audio_end received
let streamingSafetyTimer = null; // safety timeout to prevent stuck state

function initStreamingPlayback() {
    if (isStreamingPlayback) return; // already initialised
    console.log('[AUDIO] initStreamingPlayback: USE_STREAMING =', USE_STREAMING);

    streamingFinalized = false;
    mediaSource = new MediaSource();
    streamingAudio = new Audio();
    const url = URL.createObjectURL(mediaSource);
    streamingAudio.src = url;
    currentAudio = streamingAudio; // for barge-in compatibility

    mediaSource.addEventListener('sourceopen', () => {
        console.log('[AUDIO] MediaSource sourceopen fired');
        try {
            sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
            sourceBuffer.addEventListener('updateend', () => {
                processAudioQueue();
                // If finalized and queue empty, call endOfStream
                if (streamingFinalized && audioQueue.length === 0 && !sourceBuffer.updating) {
                    try {
                        if (mediaSource.readyState === 'open') {
                            console.log('[AUDIO] All chunks appended, calling endOfStream');
                            mediaSource.endOfStream();
                        }
                    } catch (e) { console.debug('[AUDIO] endOfStream error:', e); }
                }
            });
            console.log('[AUDIO] SourceBuffer created, flushing', audioQueue.length, 'queued chunks');
            processAudioQueue(); // flush anything queued before sourceopen
        } catch (e) {
            console.warn('[AUDIO] addSourceBuffer failed, falling back:', e);
            cleanupStreamingPlayback();
        }
    });

    streamingAudio.addEventListener('ended', () => {
        console.log('[AUDIO] Streaming audio ended event');
        if (streamingSafetyTimer) { clearTimeout(streamingSafetyTimer); streamingSafetyTimer = null; }
        cleanupStreamingPlayback();
        autoStartListening();
    });

    streamingAudio.addEventListener('error', (e) => {
        console.warn('[AUDIO] Streaming audio error:', streamingAudio.error);
        if (streamingSafetyTimer) { clearTimeout(streamingSafetyTimer); streamingSafetyTimer = null; }
        cleanupStreamingPlayback();
        // Fall back: play whatever we accumulated
        playAudioChunks();
    });

    streamingAudio.play().then(() => {
        console.log('[AUDIO] Streaming play() started OK');
    }).catch(e => {
        console.warn('[AUDIO] Streaming play() rejected:', e);
        cleanupStreamingPlayback();
    });

    isStreamingPlayback = true;

    // Start barge-in monitoring
    if (micAvailable && !isTerminal) startBargeInMonitor();
}

function processAudioQueue() {
    if (!sourceBuffer || sourceBuffer.updating || audioQueue.length === 0) return;
    try {
        const chunk = audioQueue.shift();
        sourceBuffer.appendBuffer(chunk);
    } catch (e) {
        console.warn('[AUDIO] appendBuffer error:', e);
    }
}

function finalizeStreamingPlayback() {
    console.log('[AUDIO] finalizeStreamingPlayback called, isStreamingPlayback=', isStreamingPlayback,
        'mediaSource=', !!mediaSource, 'sourceBuffer=', !!sourceBuffer,
        'queueLen=', audioQueue.length);

    if (!isStreamingPlayback || !mediaSource) {
        console.log('[AUDIO] Not streaming, falling back to blob playback');
        playAudioChunks();
        return;
    }

    streamingFinalized = true;

    // If sourceBuffer exists, queue is empty, and not updating — end now
    if (sourceBuffer && audioQueue.length === 0 && !sourceBuffer.updating) {
        try {
            if (mediaSource.readyState === 'open') {
                console.log('[AUDIO] Immediate endOfStream (queue already empty)');
                mediaSource.endOfStream();
            }
        } catch (e) { console.debug('[AUDIO] endOfStream:', e); }
    } else if (!sourceBuffer) {
        // sourceopen never fired — no SourceBuffer, audio can't play
        console.warn('[AUDIO] No sourceBuffer when finalizing — sourceopen never fired, cleaning up');
        cleanupStreamingPlayback();
        autoStartListening();
        return;
    }
    // else: updateend handler will call endOfStream when queue drains

    // Safety timeout: if 'ended' event doesn't fire within 10s, force cleanup
    streamingSafetyTimer = setTimeout(() => {
        console.warn('[AUDIO] Safety timeout — streaming ended event never fired, forcing cleanup');
        streamingSafetyTimer = null;
        cleanupStreamingPlayback();
        autoStartListening();
    }, 10000);
}

function cleanupStreamingPlayback() {
    console.log('[AUDIO] cleanupStreamingPlayback');
    if (streamingSafetyTimer) { clearTimeout(streamingSafetyTimer); streamingSafetyTimer = null; }
    if (streamingAudio) {
        URL.revokeObjectURL(streamingAudio.src);
        // Don't pause if ended naturally
        if (!streamingAudio.ended) streamingAudio.pause();
        streamingAudio = null;
    }
    currentAudio = null;
    mediaSource = null;
    sourceBuffer = null;
    audioQueue = [];
    isStreamingPlayback = false;
    streamingFinalized = false;
    isTaraSpeaking = false;
    stopBargeInMonitor();
}

// ── Fallback: blob-based playback (Firefox, error recovery) ──

function playAudioChunks() {
    console.log('[AUDIO] playAudioChunks: chunks =', incomingAudioChunks.length);
    if (incomingAudioChunks.length === 0) {
        isTaraSpeaking = false;
        autoStartListening();
        return;
    }
    const blob = new Blob(incomingAudioChunks, { type: 'audio/mpeg' });
    incomingAudioChunks = [];
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
        console.log('[AUDIO] Blob audio ended');
        URL.revokeObjectURL(url);
        currentAudio = null;
        isTaraSpeaking = false;
        stopBargeInMonitor();
        autoStartListening();
    };
    currentAudio.play().catch(e => {
        console.error('[AUDIO] Blob playback failed:', e);
        currentAudio = null;
        isTaraSpeaking = false;
        stopBargeInMonitor();
        autoStartListening();
    });

    // Start barge-in: monitor mic for user speech during Tara's playback
    if (micAvailable && !isTerminal) startBargeInMonitor();
}

// ── Barge-in: detect user speech while Tara is talking ──
function startBargeInMonitor() {
    if (!audioStream || !analyserNode || !audioContext) return;
    if (audioContext.state === 'suspended') audioContext.resume();

    bargeInSource = audioContext.createMediaStreamSource(audioStream);
    bargeInSource.connect(analyserNode);

    bargeInInterval = setInterval(() => {
        if (!isTaraSpeaking || !currentAudio || isTerminal) {
            stopBargeInMonitor();
            return;
        }

        const data = new Float32Array(analyserNode.fftSize);
        analyserNode.getFloatTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
        const rms = Math.sqrt(sum / data.length);

        if (rms > BARGE_IN_THRESHOLD) {
            console.log('[BARGE-IN] User speech detected, interrupting Tara');
            stopBargeInMonitor();
            // Clean up streaming playback if active
            if (isStreamingPlayback) {
                cleanupStreamingPlayback();
            } else if (currentAudio) {
                currentAudio.pause();
                URL.revokeObjectURL(currentAudio.src);
                currentAudio = null;
            }
            isTaraSpeaking = false;
            incomingAudioChunks = [];
            audioQueue = [];
            // Notify server to cancel TTS immediately
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'barge_in' }));
            }
            startListening();
        }
    }, 60);
}

function stopBargeInMonitor() {
    if (bargeInInterval) { clearInterval(bargeInInterval); bargeInInterval = null; }
    if (bargeInSource) { bargeInSource.disconnect(); bargeInSource = null; }
}

function autoStartListening() {
    console.log('[MIC] autoStartListening called: isTerminal=', isTerminal,
        'micAvailable=', micAvailable, 'isRecording=', isRecording,
        'isTaraSpeaking=', isTaraSpeaking);
    if (isTerminal || !micAvailable) {
        if (!isTerminal) setStatus('', 'Type your response');
        console.log('[MIC] autoStartListening skipped: terminal=', isTerminal, 'mic=', micAvailable);
        return;
    }
    setTimeout(() => {
        if (!isTerminal && !isRecording && !isTaraSpeaking) {
            console.log('[MIC] autoStartListening → startListening()');
            startListening();
        } else {
            console.log('[MIC] autoStartListening timeout skipped: terminal=', isTerminal,
                'recording=', isRecording, 'speaking=', isTaraSpeaking);
        }
    }, 150);  // Reduced from 400ms — faster mic reopen after Tara speaks
}

// ═══════════════════════════════════════════════════
//  Text Input Fallback
// ═══════════════════════════════════════════════════
function sendText() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    if (isRecording) stopListening();
    if (currentAudio) {
        currentAudio.pause(); currentAudio = null; isTaraSpeaking = false;
        // Notify server to cancel TTS
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'barge_in' }));
        }
    }

    addMessage('user', text);
    turnStartTime = performance.now();
    latencyData = {};
    ws.send(JSON.stringify({ message: text }));
    input.value = '';
    setStatus('thinking', 'Processing...');
}

// ═══════════════════════════════════════════════════
//  State Panel Rendering (Left)
// ═══════════════════════════════════════════════════
function renderState(state) {
    const container = document.getElementById('state-content');
    const dot = document.getElementById('state-dot');
    dot.classList.add('live');

    let html = '';

    // ── Routing Decision ──
    const rd = state.routing_decision || {};
    const node = rd.next_node || '';
    html += `<div class="state-section">
        <div class="state-section-title">Routing Decision</div>
        <div class="state-row" data-key="next_node">
            <span class="state-key">next_node</span>
            <span class="node-badge ${node}">${node || '\u2014'}</span>
        </div>
        ${rd.reasoning ? `<div class="state-reasoning">${escapeHtml(rd.reasoning)}</div>` : ''}
    </div>`;

    // ── Session State ──
    const phase = String(state.conversation_phase || 'init').replace('ConversationPhase.', '');
    const phaseClass = phase.startsWith('completed') ? 'success' : 'highlight';
    const agentLabel = (AGENT_PROFILES[state.agent_type] || {}).label || state.agent_type || '';
    html += `<div class="state-section">
        <div class="state-section-title">Session</div>
        ${agentLabel ? stateRow('agent', agentLabel, state.agent_type === 'pre_due' ? 'success' : state.agent_type === 'bucket_x' ? 'warning' : 'danger') : ''}
        ${stateRow('phase', phase, phaseClass)}
        ${stateRow('turn', state.turn_count || 0)}
        ${stateRow('messages', state.message_count || 0)}
        ${stateRow('terminal', state.is_terminal ? 'YES' : 'no', state.is_terminal ? 'danger' : 'muted')}
    </div>`;

    // ── Identity ──
    const verified = state.identity_verified;
    html += `<div class="state-section">
        <div class="state-section-title">Identity</div>
        ${stateRow('verified', verified ? 'YES' : 'no', verified ? 'success' : 'muted')}
        ${stateRow('attempts', state.verification_attempts || 0)}
    </div>`;

    // ── Sentiment, Aggression & Objections ──
    const sentiment = String(state.current_sentiment || 'neutral').replace('SentimentLevel.', '');
    const sentimentClass = sentiment === 'very_negative' ? 'danger' :
                           sentiment === 'negative' ? 'warning' :
                           sentiment === 'cooperative' || sentiment === 'positive' ? 'success' : '';
    const aggrLevel = state.aggression_level || 1;
    const aggrDesc = state.aggression_desc || '';
    const aggrClass = aggrLevel >= 4 ? 'danger' : aggrLevel >= 3 ? 'warning' : aggrLevel >= 2 ? '' : 'success';
    const aggrBar = '\u2588'.repeat(aggrLevel) + '\u2591'.repeat(4 - aggrLevel);
    const objection = String(state.current_objection || 'none').replace('ObjectionType.', '');
    const objections = state.objections_raised || [];
    html += `<div class="state-section">
        <div class="state-section-title">Sentiment & Tone</div>
        ${stateRow('sentiment', sentiment, sentimentClass)}
        ${stateRow('aggression', aggrBar + ' L' + aggrLevel, aggrClass)}
        ${stateRow('objection', objection, objection !== 'none' ? 'warning' : 'muted')}
        ${objections.length > 0 ? stateRow('raised', objections.join(', '), 'warning') : ''}
    </div>`;

    // ── Negotiation ──
    const neg = state.negotiation || {};
    html += `<div class="state-section">
        <div class="state-section-title">Negotiation</div>
        ${stateRow('offers', neg.offers_presented || 0)}
        ${stateRow('concessions', neg.concessions_made || 0)}
        ${stateRow('agreed', neg.agreed_option ? 'YES' : 'no', neg.agreed_option ? 'success' : 'muted')}
    </div>`;

    // ── Call Progress ──
    const cp = state.call_progress || {};
    const partialAmt = cp.partial_amount_committed || 0;
    const remainingAmt = cp.remaining_amount || 0;
    const locked = cp.payment_locked || false;
    const idChallenged = cp.identity_challenged || false;
    const loopCount = cp.objection_loop_count || 0;
    const lastObj = cp.last_objection || '';
    const callOutcome = cp.call_outcome || '';
    const hasProgress = partialAmt > 0 || idChallenged || loopCount > 1 || callOutcome;
    if (hasProgress || locked) {
        html += `<div class="state-section">
            <div class="state-section-title">Call Progress</div>
            ${partialAmt > 0 ? stateRow('offer', '\u20B9' + Number(partialAmt).toLocaleString('en-IN'), locked ? 'success' : 'warning') : ''}
            ${locked ? stateRow('locked', '\u2713 LOCKED', 'success') : ''}
            ${remainingAmt > 0 ? stateRow('remaining', '\u20B9' + Number(remainingAmt).toLocaleString('en-IN'), 'muted') : ''}
            ${cp.payment_mode_confirmed ? stateRow('mode', cp.payment_mode_confirmed) : ''}
            ${idChallenged ? stateRow('identity', 'CHALLENGED (turn ' + (cp.identity_challenge_turn || '?') + ')', 'danger') : ''}
            ${cp.claimed_identity ? stateRow('claims', cp.claimed_identity, 'warning') : ''}
            ${loopCount > 1 ? stateRow('loop', lastObj + ' \u00D7' + loopCount, 'warning') : ''}
            ${callOutcome ? stateRow('outcome', callOutcome, callOutcome === 'payment_committed' ? 'success' : 'danger') : ''}
        </div>`;
    }

    // ── Borrower Profile ──
    const bp = state.borrower_profile || {};
    const dpd = bp.days_past_due || 0;
    const dpdClass = dpd > 180 ? 'danger' : dpd > 90 ? 'warning' : dpd > 30 ? '' : 'success';
    html += `<div class="state-section">
        <div class="state-section-title">Borrower</div>
        ${stateRow('name', bp.full_name || '\u2014')}
        ${stateRow('id', bp.borrower_id || '\u2014', 'muted')}
        ${stateRow('amount', bp.debt_amount ? '\u20B9' + Number(bp.debt_amount).toLocaleString('en-IN') : '\u2014')}
        ${stateRow('type', (bp.debt_type || '\u2014').replace(/_/g, ' '))}
        ${stateRow('DPD', dpd + ' days', dpdClass)}
        ${stateRow('risk', bp.risk_tier || '\u2014', bp.risk_tier === 'high' ? 'danger' : bp.risk_tier === 'medium' ? 'warning' : '')}
        ${stateRow('lender', bp.original_creditor || '\u2014', 'muted')}
    </div>`;

    // ── Escalation ──
    if (state.escalation_reason) {
        html += `<div class="state-section">
            <div class="state-section-title">Escalation</div>
            ${stateRow('reason', state.escalation_reason, 'danger')}
        </div>`;
    }

    container.innerHTML = html;

    // Highlight changed rows
    if (prevState) {
        highlightChanges(state, prevState);
    }
    prevState = JSON.parse(JSON.stringify(state));
}

function stateRow(key, val, cls) {
    return `<div class="state-row" data-key="${key}">
        <span class="state-key">${key}</span>
        <span class="state-val ${cls || ''}">${escapeHtml(String(val))}</span>
    </div>`;
}

function highlightChanges(newState, oldState) {
    const flat = (s) => ({
        phase: s.conversation_phase,
        turn: s.turn_count,
        verified: s.identity_verified,
        sentiment: s.current_sentiment,
        aggression: s.aggression_level,
        objection: s.current_objection,
        terminal: s.is_terminal,
        next_node: (s.routing_decision || {}).next_node,
        offers: (s.negotiation || {}).offers_presented,
        agreed: (s.negotiation || {}).agreed_option,
    });
    const newFlat = flat(newState);
    const oldFlat = flat(oldState);
    for (const key of Object.keys(newFlat)) {
        if (JSON.stringify(newFlat[key]) !== JSON.stringify(oldFlat[key])) {
            const row = document.querySelector(`.state-row[data-key="${key}"]`);
            if (row) {
                row.classList.remove('updated');
                void row.offsetWidth;
                row.classList.add('updated');
            }
        }
    }
}

function renderCallHistory() {

                <span class="che-duration">${entry.duration}</span>

}

// ═══════════════════════════════════════════════════
//  UI Helpers
// ═══════════════════════════════════════════════════
function addMessage(speaker, text) {
    const container = document.getElementById('transcript');
    const div = document.createElement('div');
    div.className = `msg ${speaker}`;
    div.innerHTML = `<div class="label">${speaker === 'tara' ? 'Tara' : 'You'}</div>${escapeHtml(text)}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showPartial(text) {
    const container = document.getElementById('transcript');
    if (!partialEl) {
        partialEl = document.createElement('div');
        partialEl.className = 'partial';
        container.appendChild(partialEl);
    }
    partialEl.textContent = text + '...';
    container.scrollTop = container.scrollHeight;
}

function removePartial() {
    if (partialEl) { partialEl.remove(); partialEl = null; }
}

function updatePhase(phase) {
    const text = String(phase).replace(/_/g, ' ').replace('ConversationPhase.', '');
    document.getElementById('phase').textContent = text;
}

function setStatus(mode, text) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    dot.className = 'status-dot' + (mode ? ' ' + mode : '');
    label.textContent = text || '';
}

function showLatency(data) {
    const bar = document.getElementById('latency-bar');
    if (!data || Object.keys(data).length === 0) { bar.innerHTML = ''; return; }
    const items = [];
    const fmt = (label, ms) => {
        const cls = ms > 3000 ? 'slow' : ms > 1000 ? 'medium' : 'fast';
        return `<div class="latency-item ${cls}">${label}: <span>${ms}ms</span></div>`;
    };
    if (data.stt_ms != null)            items.push(fmt('STT', data.stt_ms));
    if (data.llm_ms != null)            items.push(fmt('LLM', data.llm_ms));
    if (data.tts_first_byte_ms != null) items.push(fmt('TTS-TTFB', data.tts_first_byte_ms));
    if (data.tts_total_ms != null)      items.push(fmt('TTS', data.tts_total_ms));
    if (data.total_ms != null)          items.push(fmt('TOTAL', data.total_ms));
    bar.innerHTML = items.join('');
}

// ── Audio Level Bars ──
function setupAudioBars() {
    const container = document.getElementById('audio-level');
    container.style.display = 'flex';
    container.innerHTML = '';
    for (let i = 0; i < NUM_BARS; i++) {
        const bar = document.createElement('div');
        bar.className = 'audio-bar';
        container.appendChild(bar);
    }
}

function updateAudioBars(rms) {
    const container = document.getElementById('audio-level');
    const bars = container.children;
    const level = Math.min(1, rms * 15);
    for (let i = 0; i < bars.length; i++) {
        const offset = Math.sin(Date.now() / 120 + i * 0.6) * 0.3 + 0.5;
        const h = Math.max(3, level * 20 * offset);
        bars[i].style.height = h + 'px';
    }
}

function hideAudioBars() {
    const container = document.getElementById('audio-level');
    container.style.display = 'none';
}

// ── Call Timer ──
function updateCallTimer() {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    document.getElementById('call-timer').textContent = mins + ':' + String(secs).padStart(2, '0');
}

// ── Error Toast ──
function showError(message) {
    const container = document.getElementById('error-container');
    const toast = document.createElement('div');
    toast.className = 'error-toast';
    toast.innerHTML = `<div class="error-label">Error</div><div class="error-msg">${escapeHtml(message)}</div>`;
    container.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 9000);
    while (container.children.length > 5) container.firstChild.remove();
}

// ── Info Toast ──
function showToast(message) {
    const container = document.getElementById('error-container');
    const toast = document.createElement('div');
    toast.className = 'info-toast';
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
    while (container.children.length > 5) container.firstChild.remove();
}
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tara - Collections Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Start Screen ── */
        #start-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }
        .logo { text-align: center; }
        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
        }
        .logo p {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .start-options {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .start-options select {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #151515;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            min-width: 260px;
            text-align: center;
            appearance: none;
        }
        .start-btn {
            padding: 16px 48px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #7c8cf5, #6366f1);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            min-width: 260px;
        }
        .start-btn:hover { transform: scale(1.03); box-shadow: 0 4px 24px rgba(99, 102, 241, 0.3); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── Call Screen ── */
        #call-screen {
            height: 100vh;
            display: none;
            flex-direction: column;
        }
        .call-header {
            padding: 14px 24px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0d0d0d;
        }
        .call-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .call-header h2 { font-size: 16px; font-weight: 600; }
        .phase-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            background: #1a1a2e;
            color: #7c8cf5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .call-timer {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            min-width: 52px;
            text-align: center;
        }
        .end-call-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid #3a2020;
            background: #1a1010;
            color: #e74c3c;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .end-call-btn:hover { background: #2a1515; }

        /* ── Error Toast ── */
        .error-container {
            position: fixed;
            top: 60px;
            right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 400px;
        }
        .error-toast {
            background: #1a1010;
            border: 1px solid #3a2020;
            border-left: 3px solid #e74c3c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #e74c3c;
            font-family: 'SF Mono', 'Menlo', monospace;
            line-height: 1.4;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 8s forwards;
            word-break: break-word;
        }
        .error-toast .error-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #e74c3c;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .error-toast .error-msg { color: #cc8888; }
        .info-toast {
            background: #101a1a;
            border: 1px solid #203a3a;
            border-left: 3px solid #f39c12;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #f39c12;
            font-family: 'SF Mono', 'Menlo', monospace;
            line-height: 1.4;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 5s forwards;
            word-break: break-word;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ── Two Column Layout ── */
        .call-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── State Panel (Left) ── */
        .state-panel {
            width: 320px;
            min-width: 320px;
            border-right: 1px solid #1a1a1a;
            background: #0d0d0d;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .state-panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
            position: sticky;
            top: 0;
            background: #0d0d0d;
            z-index: 1;
        }
        .state-panel-header .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }
        .state-panel-header .dot.live { background: #6bc56b; }

        .state-section {
            padding: 10px 16px;
            border-bottom: 1px solid #111;
        }
        .state-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #555;
            margin-bottom: 8px;
        }
        .state-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 3px 0;
            font-size: 12px;
            line-height: 1.4;
        }
        .state-key {
            color: #666;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .state-val {
            color: #bbb;
            text-align: right;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
            word-break: break-word;
            max-width: 180px;
        }
        .state-val.highlight { color: #7c8cf5; font-weight: 600; }
        .state-val.success { color: #6bc56b; }
        .state-val.warning { color: #f5a623; }
        .state-val.danger { color: #e74c3c; }
        .state-val.muted { color: #444; }

        .state-reasoning {
            font-size: 11px;
            color: #555;
            font-style: italic;
            padding: 4px 0;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Node badge in state panel */
        .node-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            font-family: 'SF Mono', 'Menlo', monospace;
            letter-spacing: 0.3px;
        }
        .node-badge.identify_borrower { background: #1a2a1a; color: #6bc56b; }
        .node-badge.state_purpose     { background: #1a1a2e; color: #7c8cf5; }
        .node-badge.handle_objection  { background: #2e1a1a; color: #e74c3c; }
        .node-badge.present_options   { background: #2a2a1a; color: #f5a623; }
        .node-badge.validate_commitment { background: #1a2a2a; color: #56c5b5; }
        .node-badge.escalate          { background: #2e1a2a; color: #c56bc5; }
        .node-badge.end_agreement     { background: #1a2e1a; color: #6bc56b; }
        .node-badge.end_refusal       { background: #2e1a1a; color: #e74c3c; }
        .node-badge.end_callback      { background: #2a2a1a; color: #f5a623; }

        /* ── Transcript Column (Right) ── */
        .call-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .transcript {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .msg {
            width: 100%;
            max-width: 600px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.tara {
            background: #141428;
            border-left: 3px solid #7c8cf5;
        }
        .msg.user {
            background: #142814;
            border-left: 3px solid #6bc56b;
        }
        .msg .label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .msg.tara .label { color: #7c8cf5; }
        .msg.user .label { color: #6bc56b; }
        .partial {
            width: 100%;
            max-width: 600px;
            padding: 6px 16px;
            font-size: 13px;
            color: #666;
            font-style: italic;
            border-left: 3px solid #333;
        }

        /* ── Bottom Bar ── */
        .bottom-bar {
            padding: 16px 24px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: #0d0d0d;
        }
        .call-status {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 24px;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }
        .status-dot.listening {
            background: #e74c3c;
            animation: pulse-dot 1.2s infinite;
        }
        .status-dot.speaking {
            background: #7c8cf5;
            animation: pulse-dot 1s infinite;
        }
        .status-dot.thinking {
            background: #f5a623;
            animation: spin 1s linear infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
            50% { box-shadow: 0 0 0 6px transparent; opacity: 0.7; }
        }
        @keyframes spin {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .status-text { font-size: 13px; color: #666; }

        /* Audio level visualizer */
        .audio-level {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 20px;
        }
        .audio-bar {
            width: 3px;
            background: #e74c3c;
            border-radius: 2px;
            transition: height 0.05s;
            height: 4px;
        }

        /* Text fallback */
        .text-fallback {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 480px;
        }
        .text-fallback input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #222;
            background: #111;
            color: #ccc;
            font-size: 13px;
            outline: none;
        }
        .text-fallback input:focus { border-color: #444; }
        .text-fallback button {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            background: #222;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
        }
        .text-fallback button:hover { background: #333; }

        /* Latency display */
        .latency-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 18px;
        }
        .latency-item {
            font-size: 11px;
            font-family: 'SF Mono', 'Menlo', monospace;
            color: #555;
        }
        .latency-item span { color: #888; font-weight: 600; }
        .latency-item.slow span { color: #e74c3c; }
        .latency-item.medium span { color: #f5a623; }
        .latency-item.fast span { color: #6bc56b; }

        /* ── State update flash animation ── */
        @keyframes state-flash {
            0% { background-color: rgba(124, 140, 245, 0.15); }
            100% { background-color: transparent; }
        }
        .state-row.updated {
            animation: state-flash 0.8s ease-out;
        }
    </style>
</head>
<body>

    <!-- ══ START SCREEN ══ -->
    <div id="start-screen">
        <div class="logo">
            <h1>TARA</h1>
            <p>AI Collections Agent</p>
        </div>
        <div class="start-options">
            <select id="borrower-select">
                <option value="BRW-001">Rajesh Kumar — Rs.85,000 (120 DPD)</option>
                <option value="BRW-002">Priya Sharma — Rs.2,45,000 (210 DPD)</option>
                <option value="BRW-003">Amit Patel — Rs.42,000 (45 DPD)</option>
            </select>
            <button class="start-btn" id="start-btn" onclick="startCall()">
                Start Conversation
            </button>
        </div>
    </div>

    <!-- ══ CALL SCREEN ══ -->
    <div id="call-screen">
        <div class="call-header">
            <div class="call-header-left">
                <h2>Tara</h2>
                <span class="phase-badge" id="phase">connecting</span>
            </div>
            <span class="call-timer" id="call-timer">0:00</span>
            <button class="end-call-btn" onclick="endCall()">End Call</button>
        </div>

        <!-- Error toasts (right side) -->
        <div class="error-container" id="error-container"></div>

        <div class="call-body">
            <!-- ── State Panel (Left) ── -->
            <div class="state-panel" id="state-panel">
                <div class="state-panel-header">
                    <div class="dot" id="state-dot"></div>
                    Conversation State
                </div>
                <div id="state-content">
                    <div class="state-section">
                        <div class="state-row">
                            <span class="state-key">waiting</span>
                            <span class="state-val muted">start a call...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Main Conversation (Right) ── -->
            <div class="call-main">
                <div class="transcript" id="transcript"></div>

                <div class="bottom-bar">
                    <div class="latency-bar" id="latency-bar"></div>
                    <div class="call-status">
                        <div class="status-dot" id="status-dot"></div>
                        <span class="status-text" id="status-text"></span>
                        <div class="audio-level" id="audio-level" style="display:none;"></div>
                    </div>
                    <div class="text-fallback">
                        <input type="text" id="text-input" placeholder="Type a message..."
                               onkeydown="if(event.key==='Enter')sendText()">
                        <button onclick="sendText()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════
let ws = null;
let isRecording = false;
let micAvailable = false;
let isTerminal = false;
let isTaraSpeaking = false;

// Call timer
let callStartTime = 0;
let callTimerInterval = null;

// Audio capture
let audioContext = null;
let audioStream = null;
let audioWorkletNode = null;
let audioSource = null;
let analyserNode = null;
let sampleRate = 16000;

// Audio playback
let incomingAudioChunks = [];
let currentAudio = null;

// VAD (Voice Activity Detection)
let vadState = 'IDLE'; // IDLE | WAITING | SPEAKING | TRAILING
let speechStartTime = 0;
let silenceStartTime = 0;
let vadInterval = null;
const VAD_THRESHOLD = 0.012;
const SILENCE_TIMEOUT = 1200;
const SPEECH_MIN_DURATION = 300;

// Latency tracking
let turnStartTime = 0;
let latencyData = {};

// Partial transcript
let partialEl = null;

// Audio level bars
const NUM_BARS = 12;

// Previous state for diff highlighting
let prevState = null;

// Barge-in (speech overlap detection)
let bargeInInterval = null;
let bargeInSource = null;     // Temporary mic source for barge-in monitoring
const BARGE_IN_THRESHOLD = 0.025;  // Higher than VAD_THRESHOLD to avoid speaker bleed

// ═══════════════════════════════════════════════════
//  AudioWorklet processor (inlined via Blob URL)
// ═══════════════════════════════════════════════════
const PROCESSOR_CODE = `
class PCMProcessor extends AudioWorkletProcessor {
    constructor() {
        super();
        this.buffer = new Float32Array(1600);
        this.writeIndex = 0;
    }
    process(inputs) {
        const input = inputs[0];
        if (!input || !input[0]) return true;
        const data = input[0];
        for (let i = 0; i < data.length; i++) {
            this.buffer[this.writeIndex++] = data[i];
            if (this.writeIndex >= this.buffer.length) {
                const int16 = new Int16Array(this.buffer.length);
                for (let j = 0; j < this.buffer.length; j++) {
                    const s = Math.max(-1, Math.min(1, this.buffer[j]));
                    int16[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage(int16.buffer, [int16.buffer]);
                this.writeIndex = 0;
            }
        }
        return true;
    }
}
registerProcessor('pcm-processor', PCMProcessor);
`;

// ═══════════════════════════════════════════════════
//  Mic Setup
// ═══════════════════════════════════════════════════
async function setupMic() {
    try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        try {
            audioContext = new AudioContext({ sampleRate: 16000 });
        } catch (e) {
            audioContext = new AudioContext();
        }
        sampleRate = audioContext.sampleRate;

        const blob = new Blob([PROCESSOR_CODE], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        await audioContext.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 2048;

        micAvailable = true;
        return true;
    } catch (e) {
        console.warn('Mic not available:', e.message);
        return false;
    }
}

// ═══════════════════════════════════════════════════
//  Start Call
// ═══════════════════════════════════════════════════
async function startCall() {
    const borrowerId = document.getElementById('borrower-select').value;
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = 'Connecting...';

    try {
        const hasMic = await setupMic();
        if (!hasMic) setStatus('listening', 'Mic unavailable — use text input');

        const res = await fetch(`/api/session?borrower_id=${borrowerId}`, { method: 'POST' });
        const data = await res.json();

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('call-screen').style.display = 'flex';

        // Start call timer
        callStartTime = Date.now();
        callTimerInterval = setInterval(updateCallTimer, 1000);
        updateCallTimer();

        addMessage('tara', data.opening_message);
        updatePhase(data.phase);

        // Render initial state from session creation
        if (data.state) renderState(data.state);

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws/${data.session_id}`);
        ws.binaryType = 'arraybuffer';
        ws.onmessage = handleWsMessage;
        ws.onclose = () => { setStatus('', 'Call ended'); isTerminal = true; };
        ws.onerror = (e) => { console.error('WS error:', e); setStatus('', 'Connection error'); };

        setStatus('speaking', 'Tara is speaking...');
    } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Start Conversation';
        alert('Failed to start: ' + err.message);
    }
}

function endCall() {
    isTerminal = true;
    stopListening();
    stopBargeInMonitor();
    if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (ws) { ws.close(); ws = null; }
    setStatus('', 'Call ended');
}

// ═══════════════════════════════════════════════════
//  Recording + VAD
// ═══════════════════════════════════════════════════
function startListening() {
    if (!micAvailable || !ws || ws.readyState !== WebSocket.OPEN || isTerminal) return;
    if (isRecording) return;
    isRecording = true;

    if (audioContext.state === 'suspended') audioContext.resume();
    ws.send(JSON.stringify({ type: 'start_recording', sample_rate: sampleRate }));

    audioSource = audioContext.createMediaStreamSource(audioStream);
    audioWorkletNode = new AudioWorkletNode(audioContext, 'pcm-processor');
    audioWorkletNode.port.onmessage = (e) => {
        if (ws && ws.readyState === WebSocket.OPEN && isRecording) ws.send(e.data);
    };
    audioSource.connect(audioWorkletNode);
    audioSource.connect(analyserNode);

    const silentGain = audioContext.createGain();
    silentGain.gain.value = 0;
    audioWorkletNode.connect(silentGain);
    silentGain.connect(audioContext.destination);

    vadState = 'WAITING';
    vadInterval = setInterval(runVAD, 60);
    setStatus('listening', 'Listening...');
    setupAudioBars();
}

function stopListening() {
    if (!isRecording) return;
    isRecording = false;
    turnStartTime = performance.now();
    latencyData = {};

    vadState = 'IDLE';
    if (vadInterval) { clearInterval(vadInterval); vadInterval = null; }
    if (audioWorkletNode) { audioWorkletNode.disconnect(); audioWorkletNode = null; }
    if (audioSource) { audioSource.disconnect(); audioSource = null; }

    removePartial();
    hideAudioBars();

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop_recording' }));
    }
    setStatus('thinking', 'Processing...');
}

// ═══════════════════════════════════════════════════
//  VAD
// ═══════════════════════════════════════════════════
function runVAD() {
    if (!analyserNode || !isRecording) return;
    const data = new Float32Array(analyserNode.fftSize);
    analyserNode.getFloatTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
    const rms = Math.sqrt(sum / data.length);
    updateAudioBars(rms);

    switch (vadState) {
        case 'WAITING':
            if (rms > VAD_THRESHOLD) { vadState = 'SPEAKING'; speechStartTime = Date.now(); }
            break;
        case 'SPEAKING':
            if (rms < VAD_THRESHOLD && Date.now() - speechStartTime > SPEECH_MIN_DURATION) {
                vadState = 'TRAILING'; silenceStartTime = Date.now();
            }
            break;
        case 'TRAILING':
            if (rms > VAD_THRESHOLD) vadState = 'SPEAKING';
            else if (Date.now() - silenceStartTime > SILENCE_TIMEOUT) stopListening();
            break;
    }
}

// ═══════════════════════════════════════════════════
//  WebSocket Message Handler
// ═══════════════════════════════════════════════════
function handleWsMessage(event) {
    if (event.data instanceof ArrayBuffer) {
        incomingAudioChunks.push(event.data);
        return;
    }

    const data = JSON.parse(event.data);

    switch (data.type) {
        case 'transcript':
            removePartial();
            addMessage(data.speaker, data.text);
            if (data.phase) updatePhase(data.phase);
            if (data.is_terminal) { isTerminal = true; setStatus('', 'Call completed'); }
            if (data.latency) {
                Object.assign(latencyData, data.latency);
                if (data.speaker === 'user' && turnStartTime) {
                    latencyData.stt_client_ms = Math.round(performance.now() - turnStartTime);
                }
            }
            break;

        case 'partial_transcript':
            showPartial(data.text);
            break;

        case 'status':
            if (data.status === 'speaking') { isTaraSpeaking = true; setStatus('speaking', 'Tara is speaking...'); }
            else if (data.status === 'thinking') setStatus('thinking', 'Processing...');
            else if (data.status === 'listening') setStatus('listening', 'Listening...');
            else if (data.status === 'no_speech') {
                setStatus('idle', 'Ready');
                showToast(data.message || 'Kuch sunai nahi diya, please phir se boliye');
            }
            break;

        case 'audio_end':
            if (data.latency) Object.assign(latencyData, data.latency);
            if (turnStartTime) latencyData.total_ms = Math.round(performance.now() - turnStartTime);
            showLatency(latencyData);
            playAudioChunks();
            break;

        case 'state_update':
            if (data.state) renderState(data.state);
            break;

        case 'terminal':
            isTerminal = true;
            if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
            // Don't close immediately — wait for audio to finish playing
            // The playAudioChunks() → autoStartListening() flow will see isTerminal
            // and stop naturally. We close the WS after a grace period.
            setTimeout(() => {
                setStatus('', 'Call completed');
                if (ws) { ws.close(); ws = null; }
            }, 5000);
            break;

        case 'error':
            console.error('Server error:', data.error);
            showError(data.error);
            break;
    }
}

// ═══════════════════════════════════════════════════
//  Audio Playback
// ═══════════════════════════════════════════════════
function playAudioChunks() {
    if (incomingAudioChunks.length === 0) {
        isTaraSpeaking = false;
        autoStartListening();
        return;
    }
    const blob = new Blob(incomingAudioChunks, { type: 'audio/mpeg' });
    incomingAudioChunks = [];
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
        URL.revokeObjectURL(url);
        currentAudio = null;
        isTaraSpeaking = false;
        stopBargeInMonitor();
        autoStartListening();
    };
    currentAudio.play().catch(e => {
        console.error('Playback failed:', e);
        currentAudio = null;
        isTaraSpeaking = false;
        stopBargeInMonitor();
        autoStartListening();
    });

    // Start barge-in: monitor mic for user speech during Tara's playback
    if (micAvailable && !isTerminal) startBargeInMonitor();
}

// ── Barge-in: detect user speech while Tara is talking ──
function startBargeInMonitor() {
    if (!audioStream || !analyserNode || !audioContext) return;
    if (audioContext.state === 'suspended') audioContext.resume();

    // Create a temporary mic source just for RMS monitoring
    // (separate from the recording source managed by startListening/stopListening)
    bargeInSource = audioContext.createMediaStreamSource(audioStream);
    bargeInSource.connect(analyserNode);

    bargeInInterval = setInterval(() => {
        if (!isTaraSpeaking || !currentAudio || isTerminal) {
            stopBargeInMonitor();
            return;
        }

        const data = new Float32Array(analyserNode.fftSize);
        analyserNode.getFloatTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
        const rms = Math.sqrt(sum / data.length);

        if (rms > BARGE_IN_THRESHOLD) {
            // User is speaking over Tara — interrupt!
            stopBargeInMonitor();

            // Stop Tara's audio immediately
            if (currentAudio) {
                currentAudio.pause();
                URL.revokeObjectURL(currentAudio.src);
                currentAudio = null;
            }
            isTaraSpeaking = false;
            incomingAudioChunks = [];  // Discard any remaining buffered audio

            // Start recording the user's speech
            startListening();
        }
    }, 60);
}

function stopBargeInMonitor() {
    if (bargeInInterval) { clearInterval(bargeInInterval); bargeInInterval = null; }
    if (bargeInSource) { bargeInSource.disconnect(); bargeInSource = null; }
}

function autoStartListening() {
    if (isTerminal || !micAvailable) {
        if (!isTerminal) setStatus('', 'Type your response');
        return;
    }
    setTimeout(() => {
        if (!isTerminal && !isRecording && !isTaraSpeaking) startListening();
    }, 400);
}

// ═══════════════════════════════════════════════════
//  Text Input Fallback
// ═══════════════════════════════════════════════════
function sendText() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    if (isRecording) stopListening();
    if (currentAudio) { currentAudio.pause(); currentAudio = null; isTaraSpeaking = false; }

    addMessage('user', text);
    turnStartTime = performance.now();
    latencyData = {};
    ws.send(JSON.stringify({ message: text }));
    input.value = '';
    setStatus('thinking', 'Processing...');
}

// ═══════════════════════════════════════════════════
//  State Panel Rendering
// ═══════════════════════════════════════════════════
function renderState(state) {
    const container = document.getElementById('state-content');
    const dot = document.getElementById('state-dot');
    dot.classList.add('live');

    // Build sections
    let html = '';

    // ── Routing Decision ──
    const rd = state.routing_decision || {};
    const node = rd.next_node || '';
    html += `<div class="state-section">
        <div class="state-section-title">Routing Decision</div>
        <div class="state-row" data-key="next_node">
            <span class="state-key">next_node</span>
            <span class="node-badge ${node}">${node || '—'}</span>
        </div>
        ${rd.reasoning ? `<div class="state-reasoning">${escapeHtml(rd.reasoning)}</div>` : ''}
    </div>`;

    // ── Session State ──
    const phase = String(state.conversation_phase || 'init').replace('ConversationPhase.', '');
    const phaseClass = phase.startsWith('completed') ? 'success' : 'highlight';
    html += `<div class="state-section">
        <div class="state-section-title">Session</div>
        ${stateRow('phase', phase, phaseClass)}
        ${stateRow('turn', state.turn_count || 0)}
        ${stateRow('messages', state.message_count || 0)}
        ${stateRow('terminal', state.is_terminal ? 'YES' : 'no', state.is_terminal ? 'danger' : 'muted')}
    </div>`;

    // ── Identity ──
    const verified = state.identity_verified;
    html += `<div class="state-section">
        <div class="state-section-title">Identity</div>
        ${stateRow('verified', verified ? 'YES' : 'no', verified ? 'success' : 'muted')}
        ${stateRow('attempts', state.verification_attempts || 0)}
    </div>`;

    // ── Sentiment, Aggression & Objections ──
    const sentiment = String(state.current_sentiment || 'neutral').replace('SentimentLevel.', '');
    const sentimentClass = sentiment === 'very_negative' ? 'danger' :
                           sentiment === 'negative' ? 'warning' :
                           sentiment === 'cooperative' || sentiment === 'positive' ? 'success' : '';
    const aggrLevel = state.aggression_level || 1;
    const aggrDesc = state.aggression_desc || '';
    const aggrClass = aggrLevel >= 4 ? 'danger' : aggrLevel >= 3 ? 'warning' : aggrLevel >= 2 ? '' : 'success';
    const aggrBar = '\u2588'.repeat(aggrLevel) + '\u2591'.repeat(4 - aggrLevel);  // ████░░
    const objection = String(state.current_objection || 'none').replace('ObjectionType.', '');
    const objections = state.objections_raised || [];
    html += `<div class="state-section">
        <div class="state-section-title">Sentiment & Tone</div>
        ${stateRow('sentiment', sentiment, sentimentClass)}
        ${stateRow('aggression', aggrBar + ' L' + aggrLevel, aggrClass)}
        ${stateRow('objection', objection, objection !== 'none' ? 'warning' : 'muted')}
        ${objections.length > 0 ? stateRow('raised', objections.join(', '), 'warning') : ''}
    </div>`;

    // ── Negotiation ──
    const neg = state.negotiation || {};
    html += `<div class="state-section">
        <div class="state-section-title">Negotiation</div>
        ${stateRow('offers', neg.offers_presented || 0)}
        ${stateRow('concessions', neg.concessions_made || 0)}
        ${stateRow('agreed', neg.agreed_option ? 'YES' : 'no', neg.agreed_option ? 'success' : 'muted')}
    </div>`;

    // ── Borrower Profile ──
    const bp = state.borrower_profile || {};
    const dpd = bp.days_past_due || 0;
    const dpdClass = dpd > 180 ? 'danger' : dpd > 90 ? 'warning' : dpd > 30 ? '' : 'success';
    html += `<div class="state-section">
        <div class="state-section-title">Borrower</div>
        ${stateRow('name', bp.full_name || '—')}
        ${stateRow('id', bp.borrower_id || '—', 'muted')}
        ${stateRow('amount', bp.debt_amount ? '₹' + Number(bp.debt_amount).toLocaleString('en-IN') : '—')}
        ${stateRow('type', (bp.debt_type || '—').replace(/_/g, ' '))}
        ${stateRow('DPD', dpd + ' days', dpdClass)}
        ${stateRow('risk', bp.risk_tier || '—', bp.risk_tier === 'high' ? 'danger' : bp.risk_tier === 'medium' ? 'warning' : '')}
        ${stateRow('lender', bp.original_creditor || '—', 'muted')}
    </div>`;

    // ── Escalation ──
    if (state.escalation_reason) {
        html += `<div class="state-section">
            <div class="state-section-title">Escalation</div>
            ${stateRow('reason', state.escalation_reason, 'danger')}
        </div>`;
    }

    container.innerHTML = html;

    // Highlight changed rows
    if (prevState) {
        highlightChanges(state, prevState);
    }
    prevState = JSON.parse(JSON.stringify(state));
}

function stateRow(key, val, cls) {
    return `<div class="state-row" data-key="${key}">
        <span class="state-key">${key}</span>
        <span class="state-val ${cls || ''}">${escapeHtml(String(val))}</span>
    </div>`;
}

function highlightChanges(newState, oldState) {
    // Simple diff: compare flat keys and flash rows that changed
    const flat = (s) => ({
        phase: s.conversation_phase,
        turn: s.turn_count,
        verified: s.identity_verified,
        sentiment: s.current_sentiment,
        aggression: s.aggression_level,
        objection: s.current_objection,
        terminal: s.is_terminal,
        next_node: (s.routing_decision || {}).next_node,
        offers: (s.negotiation || {}).offers_presented,
        agreed: (s.negotiation || {}).agreed_option,
    });
    const newFlat = flat(newState);
    const oldFlat = flat(oldState);
    for (const key of Object.keys(newFlat)) {
        if (JSON.stringify(newFlat[key]) !== JSON.stringify(oldFlat[key])) {
            const row = document.querySelector(`.state-row[data-key="${key}"]`);
            if (row) {
                row.classList.remove('updated');
                void row.offsetWidth; // force reflow for re-triggering animation
                row.classList.add('updated');
            }
        }
    }
}

// ═══════════════════════════════════════════════════
//  UI Helpers
// ═══════════════════════════════════════════════════
function addMessage(speaker, text) {
    const container = document.getElementById('transcript');
    const div = document.createElement('div');
    div.className = `msg ${speaker}`;
    div.innerHTML = `<div class="label">${speaker === 'tara' ? 'Tara' : 'You'}</div>${escapeHtml(text)}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showPartial(text) {
    const container = document.getElementById('transcript');
    if (!partialEl) {
        partialEl = document.createElement('div');
        partialEl.className = 'partial';
        container.appendChild(partialEl);
    }
    partialEl.textContent = text + '...';
    container.scrollTop = container.scrollHeight;
}

function removePartial() {
    if (partialEl) { partialEl.remove(); partialEl = null; }
}

function updatePhase(phase) {
    const text = String(phase).replace(/_/g, ' ').replace('ConversationPhase.', '');
    document.getElementById('phase').textContent = text;
}

function setStatus(mode, text) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    dot.className = 'status-dot' + (mode ? ' ' + mode : '');
    label.textContent = text || '';
}

function showLatency(data) {
    const bar = document.getElementById('latency-bar');
    if (!data || Object.keys(data).length === 0) { bar.innerHTML = ''; return; }
    const items = [];
    const fmt = (label, ms) => {
        const cls = ms > 3000 ? 'slow' : ms > 1000 ? 'medium' : 'fast';
        return `<div class="latency-item ${cls}">${label}: <span>${ms}ms</span></div>`;
    };
    if (data.stt_ms != null)            items.push(fmt('STT', data.stt_ms));
    if (data.llm_ms != null)            items.push(fmt('LLM', data.llm_ms));
    if (data.tts_first_byte_ms != null) items.push(fmt('TTS-TTFB', data.tts_first_byte_ms));
    if (data.tts_total_ms != null)      items.push(fmt('TTS', data.tts_total_ms));
    if (data.total_ms != null)          items.push(fmt('TOTAL', data.total_ms));
    bar.innerHTML = items.join('');
}

// ── Audio Level Bars ──
function setupAudioBars() {
    const container = document.getElementById('audio-level');
    container.style.display = 'flex';
    container.innerHTML = '';
    for (let i = 0; i < NUM_BARS; i++) {
        const bar = document.createElement('div');
        bar.className = 'audio-bar';
        container.appendChild(bar);
    }
}

function updateAudioBars(rms) {
    const container = document.getElementById('audio-level');
    const bars = container.children;
    const level = Math.min(1, rms * 15);
    for (let i = 0; i < bars.length; i++) {
        const offset = Math.sin(Date.now() / 120 + i * 0.6) * 0.3 + 0.5;
        const h = Math.max(3, level * 20 * offset);
        bars[i].style.height = h + 'px';
    }
}

function hideAudioBars() {
    const container = document.getElementById('audio-level');
    container.style.display = 'none';
}

// ── Call Timer ──
function updateCallTimer() {
    if (!callStartTime) return;
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    document.getElementById('call-timer').textContent = mins + ':' + String(secs).padStart(2, '0');
}

// ── Error Toast ──
function showError(message) {
    const container = document.getElementById('error-container');
    const toast = document.createElement('div');
    toast.className = 'error-toast';
    toast.innerHTML = `<div class="error-label">Error</div><div class="error-msg">${escapeHtml(message)}</div>`;
    container.appendChild(toast);
    // Auto-remove after 9 seconds (8s visible + 1s fade buffer)
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 9000);
    // Cap visible toasts at 5
    while (container.children.length > 5) container.firstChild.remove();
}

// ── Info Toast (for non-error feedback like no_speech) ──
function showToast(message) {
    const container = document.getElementById('error-container');
    const toast = document.createElement('div');
    toast.className = 'info-toast';
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
    while (container.children.length > 5) container.firstChild.remove();
}
</script>
